<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PixelPaint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100vh;
            padding: 20px;
        }

        .header {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1400px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #1e1e1e;
        }

        #status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2em;
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 20px 40px;
            border-radius: 8px;
            display: none;
        }

        #progress {
            margin: 0;
            padding: 0;
            width: 300px;
            height: 6px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 15px;
        }

        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 15px auto 0;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #output {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }

        .footer {
            color: white;
            text-align: center;
            margin-top: 20px;
            opacity: 0.8;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .header p {
                font-size: 1em;
            }

            .container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 PixelPaint</h1>
            <p>Create beautiful pixel art in your browser</p>
        </div>
        
        <div class="canvas-container">
            <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
            
            <div id="status">
                <div>Loading PixelPaint...</div>
                <div id="progress">
                    <div id="progress-bar"></div>
                </div>
                <div class="spinner"></div>
            </div>

            <textarea id="output" rows="8"></textarea>
        </div>

        <div class="footer">
            Built with SDL3, Dear ImGui, and Emscripten
        </div>
    </div>

    <script type='text/javascript'>
        var statusElement = document.getElementById('status');
        var progressElement = document.getElementById('progress-bar');
        var outputElement = document.getElementById('output');
        var canvas = document.getElementById('canvas');

        var Module = {
            preRun: [],
            postRun: [],
            print: (function() {
                return function(text) {
                    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                    console.log(text);
                    outputElement.value += text + "\n";
                    outputElement.scrollTop = outputElement.scrollHeight;
                };
            })(),
            printErr: function(text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                console.error(text);
                outputElement.value += 'ERROR: ' + text + "\n";
                outputElement.scrollTop = outputElement.scrollHeight;
            },
            canvas: (function() {
                canvas.addEventListener("webglcontextlost", function(e) {
                    alert('WebGL context lost. You will need to reload the page.');
                    e.preventDefault();
                }, false);
                return canvas;
            })(),
            setStatus: function(text) {
                if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
                if (text === Module.setStatus.last.text) return;
                
                var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                var now = Date.now();
                
                if (m && now - Module.setStatus.last.time < 30) return;
                
                Module.setStatus.last.time = now;
                Module.setStatus.last.text = text;
                
                if (m) {
                    text = m[1];
                    var progress = parseInt(m[2]) * 100 / parseInt(m[4]);
                    progressElement.style.width = progress + '%';
                }
                
                if (text) {
                    statusElement.style.display = 'block';
                    statusElement.querySelector('div').textContent = text;
                } else {
                    statusElement.style.display = 'none';
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
            }
        };

        Module.setStatus('Downloading...');

        window.onerror = function(event) {
            Module.setStatus('Exception thrown, see JavaScript console');
            statusElement.style.display = 'block';
            statusElement.querySelector('div').textContent = 'Error loading application';
            Module.setStatus = function(text) {
                if (text) console.error('[post-exception status] ' + text);
            };
        };

        // Show console output toggle (for debugging)
        var showConsole = false;
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                showConsole = !showConsole;
                outputElement.style.display = showConsole ? 'block' : 'none';
            }
        });

        // File handling helpers for FileChooser
        Module.downloadFile = function(filename, mimeType) {
            // Create a temporary file input for saving
            var input = document.createElement('input');
            input.type = 'text';
            input.value = filename;
            input.style.display = 'none';
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            console.log('Filename copied to clipboard: ' + filename);
        };

        // Helper to trigger file download from Emscripten filesystem
        Module.triggerDownload = function(fsPath, suggestedFilename) {
            try {
                if (FS && FS.readFile) {
                    var data = FS.readFile(fsPath);
                    var blob = new Blob([data], { type: 'application/octet-stream' });
                    var url = URL.createObjectURL(blob);
                    var link = document.createElement('a');
                    link.href = url;
                    link.download = suggestedFilename || 'download';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }
            } catch(e) {
                console.error('Error downloading file:', e);
            }
        };

        // Store file data from file picker
        if (!Module.fileData) {
            Module.fileData = {};
        }
    </script>
    {{{ SCRIPT }}}
</body>
</html>
